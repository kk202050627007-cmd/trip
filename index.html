<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>东欧 10 日游 · 旅行规划</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #1a1209;
  --ink2: #4a3f2f;
  --ink3: #8a7a65;
  --paper: #faf7f2;
  --paper2: #f2ede4;
  --paper3: #e8e0d2;
  --gold: #b5832a;
  --gold2: #d4a843;
  --green: #2d6a4f;
  --green2: #52b788;
  --red: #9b2226;
  --blue: #1d3a6e;
  --purple: #4a2c6e;
  --r: 14px;
  --shadow: 0 2px 16px rgba(26,18,9,.08), 0 1px 4px rgba(26,18,9,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── HEADER ── */
.app-header {
  background: var(--ink);
  color: var(--paper);
  padding: 52px 20px 28px;
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(181,131,42,.25) 0%, transparent 70%);
  pointer-events: none;
}
.header-eyebrow {
  font-family: 'Noto Serif SC', serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold2);
  margin-bottom: 8px;
}
.header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
}
.header-sub {
  font-size: 12px;
  color: rgba(250,247,242,.5);
  font-weight: 300;
  margin-bottom: 16px;
}
.sync-bar {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,.1);
  color: rgba(250,247,242,.7);
  margin-bottom: 16px;
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #aaa;
  flex-shrink: 0;
  transition: background .3s;
}
.sync-dot.live  { background: var(--green2); box-shadow: 0 0 6px var(--green2); }
.sync-dot.saving { background: var(--gold2); }
.sync-dot.error  { background: var(--red); }

.header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-share {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold); color: #fff;
  border: none; border-radius: 8px;
  padding: 10px 18px; font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; font-weight: 500;
  transition: background .2s;
}
.btn-share:hover { background: var(--gold2); }
.btn-addday {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.12); color: var(--paper);
  border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: 10px 18px; font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; font-weight: 400;
  transition: background .2s;
}
.btn-addday:hover { background: rgba(255,255,255,.2); }

/* ── COLLAB BADGE ── */
.collab-bar {
  background: #fff;
  border-bottom: 1px solid var(--paper3);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink3);
}
.collab-avatars { display: flex; gap: -4px; }
.collab-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--gold2);
  font-size: 11px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #fff;
  margin-right: -6px;
}
.collab-text { margin-left: 10px; }

/* ── MAIN ── */
.main { padding: 16px 16px 0; }

/* ── DAY CARD ── */
.day-card {
  background: #fff;
  border-radius: var(--r);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--paper3);
  transition: box-shadow .2s;
}
.day-card.open { box-shadow: 0 4px 24px rgba(26,18,9,.11), 0 1px 4px rgba(26,18,9,.06); }
.day-head {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 16px 16px 14px;
  cursor: pointer; user-select: none;
}
.day-badge {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--gold2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0; line-height: 1;
}
.day-badge .lbl { font-size: 9px; color: rgba(250,247,242,.4); letter-spacing: 1px; }
.day-badge .num { font-size: 18px; font-weight: 600; font-family: 'Noto Serif SC', serif; }
.day-info { flex: 1; min-width: 0; }
.day-title { font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.35; margin-bottom: 3px; }
.day-summary { font-size: 12px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
.day-chips { display: flex; gap: 8px; }
.chip { font-size: 11px; color: var(--ink3); display: inline-flex; align-items: center; gap: 3px; }
.chev { font-size: 18px; color: var(--paper3); flex-shrink: 0; transition: transform .22s ease; }
.day-card.open .chev { transform: rotate(180deg); }

.day-body { display: none; border-top: 1px solid var(--paper2); padding: 14px 14px 16px; }
.day-card.open .day-body { display: block; }

.meta-edit { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.meta-edit input {
  background: var(--paper2); border: 1px solid var(--paper3);
  border-radius: 8px; padding: 9px 12px;
  font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
  color: var(--ink); width: 100%; outline: none;
}
.meta-edit input:focus { border-color: var(--gold); }

/* ── ITEMS ── */
.item-row {
  display: flex; gap: 10px; padding: 10px 6px;
  border-radius: 8px; transition: background .15s; align-items: flex-start;
}
.item-row:hover { background: var(--paper2); }
.item-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; margin-top: 1px;
}
.ic-sight   { background: #e8f5ee; }
.ic-food    { background: #fef3e2; }
.ic-transit { background: #ece8fd; }
.ic-hotel   { background: #fde8f0; }
.ic-plane   { background: #e2eefa; }

.item-main { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.4; }
.item-time-tag {
  display: inline-block; background: var(--paper2); color: var(--ink3);
  font-size: 11px; padding: 1px 8px; border-radius: 5px;
  margin-right: 6px; vertical-align: middle;
}
.item-meta { font-size: 11px; color: var(--ink3); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.tag { display: inline-block; padding: 1px 8px; border-radius: 5px; font-size: 10px; }
.tag-transit { background: #ece8fd; color: var(--purple); }
.tag-plane   { background: #e2eefa; color: var(--blue); }
.tag-hotel   { background: #fde8f0; color: var(--red); }
.item-note { font-size: 12px; color: var(--ink3); margin-top: 5px; line-height: 1.6; }
.item-del {
  width: 30px; height: 30px; border: none; background: none;
  color: var(--paper3); font-size: 18px; cursor: pointer;
  flex-shrink: 0; border-radius: 6px;
  transition: color .15s, background .15s;
  display: flex; align-items: center; justify-content: center;
}
.item-del:hover { color: var(--red); background: #fde8f0; }

/* ── FORM ── */
.add-row {
  margin-top: 8px; width: 100%; background: none;
  border: 1.5px dashed var(--paper3); border-radius: 8px;
  padding: 10px; color: var(--ink3); font-size: 13px;
  cursor: pointer; text-align: center;
  font-family: 'Noto Sans SC', sans-serif;
  transition: border-color .15s, color .15s;
}
.add-row:hover { border-color: var(--gold); color: var(--gold); }

.add-form {
  margin-top: 10px; background: var(--paper2);
  border-radius: 10px; padding: 14px; border: 1px solid var(--paper3);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1/-1; }
.form-label { font-size: 11px; color: var(--ink3); }
.form-field input, .form-field select {
  background: #fff; border: 1px solid var(--paper3);
  border-radius: 7px; padding: 9px 10px; font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif; color: var(--ink); outline: none; width: 100%;
}
.form-field input:focus, .form-field select:focus { border-color: var(--gold); }
.form-btns { display: flex; gap: 8px; margin-top: 12px; }
.form-btns button {
  flex: 1; padding: 10px; border-radius: 8px; border: none;
  font-size: 13px; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; font-weight: 500;
}
.btn-save-item { background: var(--green); color: #fff; }
.btn-cancel-item { background: var(--paper3); color: var(--ink2); }

.del-day-btn {
  margin-top: 12px; width: 100%; background: none;
  border: 1px solid #fde8f0; border-radius: 8px;
  padding: 9px; color: var(--red); font-size: 12px;
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  transition: background .15s;
}
.del-day-btn:hover { background: #fde8f0; }

/* ── SHARE MODAL ── */
.share-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(26,18,9,.55); z-index: 999;
  align-items: flex-end;
}
.share-modal.show { display: flex; }
.share-sheet {
  background: var(--paper); border-radius: 20px 20px 0 0;
  padding: 28px 20px 44px; width: 100%;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } }
.share-sheet h3 { font-family: 'Noto Serif SC', serif; font-size: 18px; margin-bottom: 8px; }
.share-sheet p { font-size: 13px; color: var(--ink3); margin-bottom: 16px; line-height: 1.7; }
.share-url {
  background: var(--paper2); border-radius: 10px; padding: 14px;
  font-size: 12px; color: var(--blue); word-break: break-all;
  margin-bottom: 16px; line-height: 1.6; border: 1px solid var(--paper3);
  font-weight: 500;
}
.share-btns { display: flex; gap: 10px; }
.share-btns button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; font-weight: 500;
}
.btn-copy { background: var(--ink); color: var(--paper); }
.btn-close-modal { background: var(--paper2); color: var(--ink2); }

/* ── LOADING ── */
.loading-screen {
  position: fixed; inset: 0; background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 9999;
  gap: 16px; transition: opacity .4s;
}
.loading-screen.hide { opacity: 0; pointer-events: none; }
.loading-title { font-family: 'Noto Serif SC', serif; font-size: 22px; color: var(--gold2); }
.loading-sub { font-size: 13px; color: rgba(250,247,242,.4); }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid rgba(181,131,42,.2);
  border-top-color: var(--gold2);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper);
  padding: 10px 22px; border-radius: 100px;
  font-size: 13px; opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none; white-space: nowrap; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .meta-edit { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-field.full { grid-column: auto; }
}
</style>
</head>

<!-- 加载屏 -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-title">东欧 10 日游</div>
  <div class="loading-sub">连接中...</div>
</div>

<!-- 主体 -->
<div id="app" style="display:none">

    <div class="header-eyebrow">✈ TRAVEL PLANNER</div>

      <button class="btn-addday" onclick="addDay()">＋ 新的一天</button>

  </div>

  <div class="collab-bar" id="collab-bar">
    <div class="collab-avatars" id="collab-avatars"></div>
    <div class="collab-text" id="collab-text">加载中...</div>
  </div>

  <div class="main" id="days-container"></div>
</div>

<!-- 分享弹窗 -->
<div class="share-modal" id="share-modal" onclick="closeShareIfBg(event)">
  <div class="share-sheet">
    <h3>🔗 分享给朋友</h3>

    <div class="share-url" id="share-url-text"></div>
    <div class="share-btns">
      <button class="btn-copy" onclick="copyUrl()">📋 复制链接</button>
      <button class="btn-close-modal" onclick="closeShare()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── 状态 ───────────────────────────────────────────────────
let tripId   = null;   // 数据库行 id
let state    = null;   // { name, days }
let isSaving = false;
let saveQueue= false;
let channel  = null;   // realtime channel

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtMin(m) {
  m = parseInt(m)||0;
  if (!m) return '—';
  if (m < 60) return m+'min';
  const h=Math.floor(m/60), mm=m%60;
  return mm ? `${h}h${mm}m` : `${h}h`;
}

// ── 同步状态显示 ────────────────────────────────────────────
function setSyncStatus(status, text) {
  const dot  = document.getElementById('sync-dot');
  const span = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + status;
  span.textContent = text;
}

// ── 初始化：找到或创建行程 ──────────────────────────────────
async function init() {
  try {
    // 从 URL hash 读取 tripId（分享链接带的）
    const hash = location.hash.slice(1);
    let targetId = hash.startsWith('trip-') ? hash : null;

    if (targetId) {
      // 用分享链接打开，加载对应行程
      const { data, error } = await sb.from('trips').select('*').eq('id', targetId).single();
      if (data) {
        tripId = data.id;
        state  = { name: data.name, days: data.days };
      } else {
        targetId = null; // 找不到就新建
      }
    }

    if (!targetId) {
      // 没有 tripId，查数据库里有没有已有行程
      const { data } = await sb.from('trips').select('id, name, days').order('created_at', { ascending: true }).limit(1);
      if (data && data.length > 0) {
        tripId = data[0].id;
        state  = { name: data[0].name, days: data[0].days };
      } else {
        // 第一次：写入种子数据
        const { data: inserted } = await sb.from('trips').insert({
          name: '东欧 10 日游 · 深圳-维也纳-布达佩斯-布拉格-维也纳',
          days: SEED_DAYS
        }).select().single();
        tripId = inserted.id;
        state  = { name: inserted.name, days: inserted.days };
      }
    }

    // 更新 URL hash，让当前链接就是分享链接
    location.hash = 'trip-' + tripId;

    // 订阅实时更新
    subscribeRealtime();

    // 渲染
    hideLoading();
    render();
    setSyncStatus('live', '实时同步已连接');
    updateCollabBar();

  } catch(e) {
    console.error(e);
    setSyncStatus('error', '连接失败，请刷新');
    hideLoading();
  }
}

// ── Realtime 订阅 ───────────────────────────────────────────
function subscribeRealtime() {
  if (channel) channel.unsubscribe();
  channel = sb
    .channel('trip-' + tripId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'trips',
      filter: `id=eq.${tripId}`
    }, payload => {
      // 收到别人的改动，如果本地没在输入就更新
      if (!isSaving && !document.activeElement?.matches('input,select')) {
        state = { name: payload.new.name, days: payload.new.days };
        render();
        showToast('行程已更新 ✨');
      }
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setSyncStatus('live', '实时同步已连接');
      else if (status === 'CLOSED') setSyncStatus('error', '连接断开，请刷新');
    });
}

// ── 保存到 Supabase ─────────────────────────────────────────
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 800);
}

async function doSave() {
  if (!tripId) return;
  isSaving = true;
  setSyncStatus('saving', '保存中...');
  try {
    const days = state.days.map(d => ({
      id: d.id, date: d.date, summary: d.summary,
      open: d.open, items: d.items
    }));
    await sb.from('trips').update({
      name: state.name,
      days,
      updated_at: new Date().toISOString()
    }).eq('id', tripId);
    setSyncStatus('live', '已保存 · 实时同步');
  } catch(e) {
    setSyncStatus('error', '保存失败，请重试');
  } finally {
    isSaving = false;
  }
}

// ── 协作者栏 ────────────────────────────────────────────────
function updateCollabBar() {
  document.getElementById('collab-text').textContent =
    '把链接发给朋友，可以一起实时编辑这份行程';
}

// ── 渲染 ───────────────────────────────────────────────────
function render() {
  document.getElementById('trip-title').textContent = state.name || '东欧 10 日游';
  const container = document.getElementById('days-container');
  container.innerHTML = state.days.map((day, di) => renderDay(day, di)).join('');
}

function renderDay(day, di) {
  const sights = day.items.filter(i=>i.type==='sight').length;
  const foods  = day.items.filter(i=>i.type==='food').length;
  const total  = day.items.reduce((s,i)=>s+(parseInt(i.duration)||0),0);

  const items = day.items.map((it, ii) => `
    <div class="item-row">
      <div class="item-icon ${ICON_CLASS[it.type]||'ic-sight'}">${ICONS[it.type]||'📍'}</div>
      <div class="item-main">
        <div class="item-name">
          ${it.time ? `<span class="item-time-tag">${esc(it.time)}</span>` : ''}
          ${esc(it.name)}
        </div>
        <div class="item-meta">
          <span>⏱ ${fmtMin(it.duration)}</span>
          ${it.type==='transit'?'<span class="tag tag-transit">路程</span>':''}
          ${it.type==='plane'  ?'<span class="tag tag-plane">航班</span>'  :''}
          ${it.type==='hotel'  ?'<span class="tag tag-hotel">住宿</span>'  :''}
        </div>
        ${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}
      </div>
      <button class="item-del" onclick="delItem(${di},${ii})">×</button>
    </div>
  `).join('');

  const formHtml = day._showForm ? `
    <div class="add-form">
      <div class="form-grid">
        <div class="form-field full">
          <label class="form-label">类型</label>
          <select id="ft-${di}">
            ${TYPE_OPTS.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}
          </select>
        </div>
        <div class="form-field full">
          <label class="form-label">名称 *</label>
          <input id="fn-${di}" placeholder="如：圣维特大教堂" />
        </div>
        <div class="form-field">
          <label class="form-label">时间</label>
          <input id="fti-${di}" placeholder="09:30" />
        </div>
        <div class="form-field">
          <label class="form-label">时长（分钟）</label>
          <input id="fd-${di}" type="number" placeholder="60" min="0" />
        </div>
        <div class="form-field full">
          <label class="form-label">备注</label>
          <input id="fno-${di}" placeholder="可选" />
        </div>
      </div>
      <div class="form-btns">
        <button class="btn-save-item" onclick="saveItem(${di})">✓ 保存</button>
        <button class="btn-cancel-item" onclick="cancelForm(${di})">取消</button>
      </div>
    </div>
  ` : `<button class="add-row" onclick="showForm(${di})">＋ 添加行程项</button>`;

  return `
    <div class="day-card ${day.open?'open':''}" id="day-${di}">
      <div class="day-head" onclick="toggleDay(${di})">
        <div class="day-badge"><span class="lbl">DAY</span><span class="num">${di+1}</span></div>
        <div class="day-info">
          <div class="day-title">${esc(day.date||'未命名')}</div>
          <div class="day-summary">${esc(day.summary||'点击展开')}</div>
          <div class="day-chips">
            <span class="chip">⛰ ${sights}</span>
            <span class="chip">🍴 ${foods}</span>
            <span class="chip">⏱ ${fmtMin(total)}</span>
          </div>
        </div>
        <div class="chev">⌄</div>
      </div>
      <div class="day-body">
        <div class="meta-edit">
          <input value="${esc(day.date||'')}" placeholder="日期/地点"
            onchange="updateMeta(${di},'date',this.value)" />
          <input value="${esc(day.summary||'')}" placeholder="当日概览"
            onchange="updateMeta(${di},'summary',this.value)" />
        </div>
        ${items}
        ${formHtml}
        <button class="del-day-btn" onclick="delDay(${di})">🗑 删除这一天</button>
      </div>
    </div>
  `;
}

function esc(s) {
  return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

// ── 交互操作 ────────────────────────────────────────────────
function toggleDay(di) {
  state.days[di].open = !state.days[di].open;
  render();
  scheduleSave();
  if (state.days[di].open)
    setTimeout(()=>document.getElementById('day-'+di)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function updateMeta(di, field, val) {
  state.days[di][field] = val;
  scheduleSave();
}

function delItem(di, ii) {
  if (!confirm(`删除「${state.days[di].items[ii].name}」？`)) return;
  state.days[di].items.splice(ii,1);
  render();
  scheduleSave();
}

function showForm(di) {
  state.days[di]._showForm = true;
  render();
  setTimeout(()=>document.getElementById('fn-'+di)?.focus(),50);
}

function cancelForm(di) {
  state.days[di]._showForm = false;
  render();
}

function saveItem(di) {
  const name = document.getElementById('fn-'+di)?.value.trim();
  if (!name) { showToast('请输入名称'); return; }
  state.days[di].items.push({
    id: uid(),
    type: document.getElementById('ft-'+di)?.value || 'sight',
    name,
    time:     document.getElementById('fti-'+di)?.value.trim()  || '',
    duration: parseInt(document.getElementById('fd-'+di)?.value) || 0,
    note:     document.getElementById('fno-'+di)?.value.trim()  || '',
  });
  state.days[di]._showForm = false;
  render();
  scheduleSave();
  showToast('已添加 ✓');
}

function addDay() {
  state.days.push({ id:uid(), date:`Day ${state.days.length+1}`, summary:'', open:true, items:[] });
  render();
  scheduleSave();
  setTimeout(()=>document.getElementById('day-'+(state.days.length-1))?.scrollIntoView({behavior:'smooth'}),80);
}

function delDay(di) {
  if (!confirm(`删除「${state.days[di].date}」整天？`)) return;
  state.days.splice(di,1);
  render();
  scheduleSave();
}

// ── 分享 ────────────────────────────────────────────────────
function openShare() {
  const url = location.origin + location.pathname + '#trip-' + tripId;
  document.getElementById('share-url-text').textContent = url;
  document.getElementById('share-modal').classList.add('show');
}
function closeShare() { document.getElementById('share-modal').classList.remove('show'); }
function closeShareIfBg(e) { if (e.target===document.getElementById('share-modal')) closeShare(); }
async function copyUrl() {
  const url = document.getElementById('share-url-text').textContent;
  try { await navigator.clipboard.writeText(url); }
  catch { const t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
  showToast('链接已复制，发给朋友吧 🎉');
  closeShare();
}

// ── Toast & Loading ──────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2400);
}
function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hide');
  document.getElementById('app').style.display = 'block';
  setTimeout(()=>el.remove(), 500);
}

// ── 启动 ────────────────────────────────────────────────────
init();
</script>
