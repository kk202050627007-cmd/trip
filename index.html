<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>东欧 10 日游 · 旅行规划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:#1a1209; --ink2:#4a3f2f; --ink3:#8a7a65;
  --paper:#faf7f2; --paper2:#f2ede4; --paper3:#e8e0d2;
  --gold:#b5832a; --gold2:#d4a843;
  --green:#2d6a4f; --green2:#52b788;
  --red:#9b2226; --blue:#1d3a6e; --purple:#4a2c6e;
  --r:14px; --shadow:0 2px 16px rgba(26,18,9,.08),0 1px 4px rgba(26,18,9,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans SC',sans-serif;min-height:100vh;padding-bottom:80px}

/* ── TABS ── */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--paper3);position:sticky;top:0;z-index:100}
.tab{flex:1;padding:14px 0;text-align:center;font-size:14px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

/* ── HEADER ── */
.app-header{background:var(--ink);color:var(--paper);padding:44px 20px 24px;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;top:-60px;right:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(181,131,42,.25) 0%,transparent 70%);pointer-events:none}
.header-eyebrow{font-size:11px;letter-spacing:3px;color:var(--gold2);margin-bottom:8px}
.header-title{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;line-height:1.3;margin-bottom:6px}
.header-sub{font-size:12px;color:rgba(250,247,242,.5);margin-bottom:14px}
.sync-bar{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(250,247,242,.7);margin-bottom:14px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s}
.sync-dot.live{background:var(--green2);box-shadow:0 0 6px var(--green2)}
.sync-dot.saving{background:var(--gold2)}
.sync-dot.error{background:var(--red)}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-share{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;font-weight:500}
.btn-addday{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:var(--paper);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 18px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer}

/* ── MAIN ── */
.main{padding:16px 16px 0}
.page{display:none}
.page.active{display:block}

/* ── DAY CARD ── */
.day-card{background:#fff;border-radius:var(--r);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--paper3)}
.day-card.open{box-shadow:0 4px 24px rgba(26,18,9,.11),0 1px 4px rgba(26,18,9,.06)}
.day-head{display:flex;align-items:center;gap:14px;padding:16px 16px 16px 14px;cursor:pointer;user-select:none}
.day-badge{width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--gold2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.day-badge .lbl{font-size:9px;color:rgba(250,247,242,.4);letter-spacing:1px}
.day-badge .num{font-size:18px;font-weight:600;font-family:'Noto Serif SC',serif}
.day-info{flex:1;min-width:0}
.day-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.35;margin-bottom:3px}
.day-summary{font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.day-chips{display:flex;gap:8px}
.chip{font-size:11px;color:var(--ink3)}
.chev{font-size:18px;color:var(--paper3);flex-shrink:0;transition:transform .22s ease}
.day-card.open .chev{transform:rotate(180deg)}
.day-body{display:none;border-top:1px solid var(--paper2);padding:14px 14px 16px}
.day-card.open .day-body{display:block}
.meta-edit{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.meta-edit input{background:var(--paper2);border:1px solid var(--paper3);border-radius:8px;padding:9px 12px;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);width:100%;outline:none}
.meta-edit input:focus{border-color:var(--gold)}

/* ── TRANSIT LINE ── */
.transit-line{display:flex;align-items:center;gap:0;padding:0 6px;margin:2px 0;position:relative}
.transit-line-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.transit-line-dot{width:8px;height:8px;border-radius:50%;background:var(--paper3);flex-shrink:0}
.transit-line-bar{width:2px;flex:1;min-height:28px;background:linear-gradient(to bottom,var(--paper3),var(--paper3));position:relative}
.transit-line-bar::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-top:2px solid var(--paper3);border-right:2px solid var(--paper3);transform:translate(-50%,-70%) rotate(135deg)}
.transit-line-info{flex:1;min-width:0;padding:4px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.transit-line-text{font-size:11px;color:var(--ink3);line-height:1.4;flex:1}
.transit-line-time{font-size:11px;color:var(--ink3);white-space:nowrap;background:var(--paper2);padding:2px 8px;border-radius:10px;flex-shrink:0}
.transit-line-actions{display:flex;gap:2px;flex-shrink:0}
.transit-line-actions .item-btn{width:22px;height:22px;font-size:12px}

/* ── ITEM ROW ── */
.item-row{display:flex;gap:10px;padding:10px 6px;border-radius:8px;align-items:flex-start;position:relative}
.item-row:hover{background:var(--paper2)}
.item-row.sub{margin-left:24px;border-left:2px solid var(--paper3);padding-left:12px;border-radius:0 8px 8px 0}
.item-row.sub .item-icon{width:28px;height:28px;font-size:13px}
.item-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.ic-sight{background:#e8f5ee} .ic-sub{background:#f0f0f0}
.ic-food{background:#fef3e2} .ic-transit{background:#ece8fd}
.ic-hotel{background:#fde8f0} .ic-plane{background:#e2eefa}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4}
.item-row.sub .item-name{font-size:13px;font-weight:400;color:var(--ink2)}
.item-time-tag{display:inline-block;background:var(--paper2);color:var(--ink3);font-size:11px;padding:1px 8px;border-radius:5px;margin-right:6px;vertical-align:middle}
.item-meta{font-size:11px;color:var(--ink3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 8px;border-radius:5px;font-size:10px}
.tag-transit{background:#ece8fd;color:var(--purple)}
.tag-plane{background:#e2eefa;color:var(--blue)}
.tag-hotel{background:#fde8f0;color:var(--red)}
.tag-sub{background:#f0f0f0;color:#666}
.item-note{font-size:12px;color:var(--ink3);margin-top:5px;line-height:1.6}
.item-actions{display:flex;gap:2px;flex-shrink:0}
.item-btn{width:28px;height:28px;border:none;background:none;color:var(--paper3);font-size:15px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s}
.item-btn:hover{color:var(--ink2);background:var(--paper2)}
.item-btn.del:hover{color:var(--red);background:#fde8f0}

/* ── EDIT FORM (inline) ── */
.item-edit-form{background:var(--paper2);border-radius:10px;padding:14px;margin:6px 0;border:1px solid var(--paper3)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-label{font-size:11px;color:var(--ink3)}
.form-field input,.form-field select,.form-field textarea{background:#fff;border:1px solid var(--paper3);border-radius:7px;padding:9px 10px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--gold)}
.form-field textarea{resize:vertical;min-height:60px}
.form-btns{display:flex;gap:8px;margin-top:12px}
.form-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;font-weight:500}
.btn-save-item{background:var(--green);color:#fff}
.btn-cancel-item{background:var(--paper3);color:var(--ink2)}

/* ── ADD BUTTONS ── */
.add-row{margin-top:8px;width:100%;background:none;border:1.5px dashed var(--paper3);border-radius:8px;padding:10px;color:var(--ink3);font-size:13px;cursor:pointer;text-align:center;font-family:'Noto Sans SC',sans-serif;transition:border-color .15s,color .15s}
.add-row:hover{border-color:var(--gold);color:var(--gold)}
.add-row.sub-btn{margin-top:4px;border-style:dashed;border-color:var(--paper3);font-size:12px;padding:7px}
.del-day-btn{margin-top:12px;width:100%;background:none;border:1px solid #fde8f0;border-radius:8px;padding:9px;color:var(--red);font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.del-day-btn:hover{background:#fde8f0}

/* ── SHARE MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,18,9,.55);z-index:999;align-items:flex-end}
.modal-bg.show{display:flex}
.modal-sheet{background:var(--paper);border-radius:20px 20px 0 0;padding:28px 20px 44px;width:100%;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}}
.modal-sheet h3{font-family:'Noto Serif SC',serif;font-size:18px;margin-bottom:8px}
.modal-sheet p{font-size:13px;color:var(--ink3);margin-bottom:16px;line-height:1.7}
.share-url{background:var(--paper2);border-radius:10px;padding:14px;font-size:12px;color:var(--blue);word-break:break-all;margin-bottom:16px;line-height:1.6;border:1px solid var(--paper3);font-weight:500}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;font-weight:500}
.btn-copy{background:var(--ink);color:var(--paper)}
.btn-close-modal{background:var(--paper2);color:var(--ink2)}

/* ── BILL PAGE ── */
.bill-section{background:#fff;border-radius:var(--r);margin-bottom:16px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--paper3)}
.bill-section h3{font-family:'Noto Serif SC',serif;font-size:16px;margin-bottom:14px;color:var(--ink)}
.member-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.member-tag{display:inline-flex;align-items:center;gap:6px;background:var(--paper2);border-radius:20px;padding:6px 14px;font-size:13px}
.member-tag .remove-member{color:var(--ink3);cursor:pointer;font-size:16px;line-height:1}
.member-tag .remove-member:hover{color:var(--red)}
.add-member-row{display:flex;gap:8px}
.add-member-row input{flex:1;background:var(--paper2);border:1px solid var(--paper3);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none}
.add-member-row input:focus{border-color:var(--gold)}
.add-member-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap}

.expense-list{margin-bottom:12px}
.expense-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--paper2)}
.expense-item:last-child{border-bottom:none}
.expense-info{flex:1;min-width:0}
.expense-payer{font-size:13px;font-weight:500;color:var(--ink)}
.expense-desc{font-size:12px;color:var(--ink3);margin-top:2px}
.expense-amount{font-size:15px;font-weight:600;color:var(--gold);flex-shrink:0}
.expense-del{width:28px;height:28px;border:none;background:none;color:var(--paper3);font-size:15px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.expense-del:hover{color:var(--red);background:#fde8f0}

.add-expense-form{background:var(--paper2);border-radius:10px;padding:14px;border:1px solid var(--paper3)}
.add-expense-form select,.add-expense-form input{background:#fff;border:1px solid var(--paper3);border-radius:7px;padding:9px 10px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none;width:100%;margin-bottom:8px}
.add-expense-form select:focus,.add-expense-form input:focus{border-color:var(--gold)}
.add-expense-form button{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;font-weight:500}

.settle-list{display:flex;flex-direction:column;gap:10px}
.settle-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--paper2);border-radius:10px;font-size:13px}
.settle-arrow{color:var(--ink3);margin:0 8px}
.settle-amount{font-weight:600;color:var(--red)}
.settle-empty{text-align:center;color:var(--ink3);font-size:13px;padding:20px 0}

.day-selector{width:100%;background:var(--paper2);border:1px solid var(--paper3);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink);outline:none;margin-bottom:8px}
.day-selector:focus{border-color:var(--gold)}

.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--paper3);margin-top:8px;font-size:13px;color:var(--ink2)}
.total-row strong{color:var(--gold);font-size:15px}

/* ── LOADING / TOAST ── */
.loading-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .4s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loading-title{font-family:'Noto Serif SC',serif;font-size:22px;color:var(--gold2)}
.loading-sub{font-size:13px;color:rgba(250,247,242,.4)}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(181,131,42,.2);border-top-color:var(--gold2);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:10px 22px;border-radius:100px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:1000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LEFT NAV ── */
.day-nav{
  position:fixed;
  left:0; top:50%;
  transform:translateY(-50%);
  z-index:200;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  background:rgba(250,247,242,.92);
  backdrop-filter:blur(8px);
  border-radius:0 12px 12px 0;
  border:1px solid var(--paper3);
  border-left:none;
  padding:8px 0;
  box-shadow:2px 0 12px rgba(26,18,9,.08);
  transition:opacity .2s;
}
.day-nav.hidden{opacity:0;pointer-events:none}
.day-nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:28px;
  padding:5px 0;
  cursor:pointer;
  position:relative;
  transition:background .15s;
  border-radius:6px;
  margin:1px 2px;
}
.day-nav-item:hover{background:var(--paper2)}
.day-nav-item.active .day-nav-num{background:var(--gold);color:#fff}
.day-nav-num{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--paper2);
  color:var(--ink3);
  font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
  line-height:1;
}
.day-nav-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--paper3);
  margin-top:3px;
}
.day-nav-item.active .day-nav-dot{background:var(--gold)}
/* tooltip on hover */
.day-nav-item::after{
  content:attr(data-label);
  position:absolute;
  left:calc(100% + 8px);
  top:50%;transform:translateY(-50%);
  background:var(--ink);color:var(--paper);
  font-size:11px;
  padding:4px 10px;
  border-radius:6px;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  z-index:300;
}
.day-nav-item:hover::after{opacity:1}

@media(max-width:400px){.meta-edit,.form-grid{grid-template-columns:1fr}.form-field.full{grid-column:auto}}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-title">东欧 10 日游</div>
  <div class="loading-sub">连接中...</div>
</div>

<div id="app" style="display:none">
  <div class="app-header">
    <div class="header-eyebrow">✈ TRAVEL PLANNER</div>
    <div class="header-title">东欧 10 日游</div>
    <div class="header-sub">与朋友实时共同编辑每日行程</div>
    <div class="sync-bar">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">连接中...</span>
    </div>
    <div class="header-actions">
      <button class="btn-share" onclick="openShare()">🔗 分享给朋友</button>
      <button class="btn-addday" onclick="addDay()">＋ 新的一天</button>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('trip')">🗺 行程</div>
    <div class="tab" onclick="switchTab('bill')">💰 账单</div>
  </div>

  <!-- 左侧目录栏 -->
  <div class="day-nav hidden" id="day-nav"></div>

  <!-- 行程页 -->
  <div class="page active" id="page-trip">
    <div class="main" id="days-container"></div>
  </div>

  <!-- 账单页 -->
  <div class="page" id="page-bill">
    <div class="main" style="padding-top:16px">

      <!-- 成员管理 -->
      <div class="bill-section">
        <h3>👥 团队成员</h3>
        <div class="member-list" id="member-list"></div>
        <div class="add-member-row">
          <input id="new-member-input" placeholder="输入成员名字，如：小明" maxlength="10"
            onkeydown="if(event.key==='Enter')addMember()" />
          <button onclick="addMember()">添加</button>
        </div>
      </div>

      <!-- 记账 -->
      <div class="bill-section">
        <h3>📝 记录支出</h3>
        <div class="expense-list" id="expense-list"></div>
        <div class="add-expense-form">
          <select id="exp-payer"></select>
          <input id="exp-desc" placeholder="项目描述，如：D3 游船票" />
          <select id="exp-day" class="day-selector"></select>
          <input id="exp-amount" type="number" placeholder="金额（元）" min="0" step="0.01" />
          <button onclick="addExpense()">＋ 添加支出</button>
        </div>
        <div class="total-row">
          <span>总支出</span>
          <strong id="total-amount">¥0.00</strong>
        </div>
      </div>

      <!-- 结算 -->
      <div class="bill-section">
        <h3>🧮 AA 结算</h3>
        <div id="settle-result"></div>
      </div>

    </div>
  </div>
</div>

<!-- 分享弹窗 -->
<div class="modal-bg" id="share-modal" onclick="closeShareIfBg(event)">
  <div class="modal-sheet">
    <h3>🔗 分享给朋友</h3>
    <p>把下面的链接发给朋友，打开即可实时协作编辑，无需注册。</p>
    <div class="share-url" id="share-url-text"></div>
    <div class="modal-btns">
      <button class="btn-copy" onclick="copyUrl()">📋 复制链接</button>
      <button class="btn-close-modal" onclick="closeShare()">关闭</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── 状态 ──────────────────────────────────────────────────
let tripId=null, state=null, billState=null, channel=null;
let saveTimer=null, billSaveTimer=null;
let editingId=null; // 当前正在编辑的行程项 id

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmtMin(m){m=parseInt(m)||0;if(!m)return'—';if(m<60)return m+'min';const h=Math.floor(m/60),mm=m%60;return mm?`${h}h${mm}m`:`${h}h`}
function esc(s){return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}

// ── Tab 切换 ───────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['trip','bill'][i]===tab));
  document.getElementById('page-trip').classList.toggle('active',tab==='trip');
  document.getElementById('page-bill').classList.toggle('active',tab==='bill');
  if(tab==='bill'){renderBill();}
  renderNav();
}

// ── 同步状态 ───────────────────────────────────────────────
function setSyncStatus(s,t){
  document.getElementById('sync-dot').className='sync-dot '+s;
  document.getElementById('sync-text').textContent=t;
}

// ── 初始化 ────────────────────────────────────────────────
async function init(){
  try{
    // 优先从 URL hash 读取 tripId，否则用固定 ID
    const hash=location.hash.slice(1);
    const FIXED_ID='86ca888c-d6a8-4790-956a-ce63ac58621f';
    let targetId=hash.startsWith('trip-')?hash.replace('trip-',''):FIXED_ID;

    const{data,error}=await sb.from('trips').select('*').eq('id',targetId).single();
    if(data){
      tripId=data.id;
      state={name:data.name,days:data.days};
      billState=data.bill||{members:[],expenses:[]};
    } else {
      // 找不到就新建
      const{data:ins}=await sb.from('trips').insert({
        name:'东欧 10 日游 · 深圳-维也纳-布达佩斯-布拉格-维也纳',
        days:SEED_DAYS,bill:{members:[],expenses:[]}
      }).select().single();
      tripId=ins.id;state={name:ins.name,days:ins.days};billState={members:[],expenses:[]};
    }
    location.hash='trip-'+tripId;
    subscribeRealtime();
    hideLoading();
    render();
    setSyncStatus('live','实时同步已连接');
  }catch(e){
    console.error(e);setSyncStatus('error','连接失败，请刷新');hideLoading();
  }
}

function subscribeRealtime(){
  if(channel)channel.unsubscribe();
  channel=sb.channel('trip-'+tripId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'trips',filter:`id=eq.${tripId}`},payload=>{
      if(!document.activeElement?.matches('input,select,textarea')){
        state={name:payload.new.name,days:payload.new.days};
        billState=payload.new.bill||{members:[],expenses:[]};
        render();renderBill();showToast('行程已更新 ✨');
      }
    })
    .subscribe(s=>{
      if(s==='SUBSCRIBED')setSyncStatus('live','实时同步已连接');
      else if(s==='CLOSED')setSyncStatus('error','连接断开，请刷新');
    });
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    setSyncStatus('saving','保存中...');
    try{
      const days=state.days.map(d=>({id:d.id,date:d.date,summary:d.summary,open:d.open,items:d.items}));
      const {error:saveErr}=await sb.from('trips').update({name:state.name,days,bill:billState,updated_at:new Date().toISOString()}).eq('id',tripId);
      if(saveErr){console.error('保存错误:',saveErr);setSyncStatus('error','❌ '+saveErr.message);showToast('❌ '+saveErr.message);return;}
      setSyncStatus('live','已保存 · 实时同步');
    }catch(e){console.error('保存异常:',e);setSyncStatus('error','保存失败: '+e.message);showToast('❌ 保存失败: '+e.message);}
  },800);
}

// ── 渲染行程 ──────────────────────────────────────────────
// ── 左侧目录栏 ────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById('day-nav');
  const tripPage=document.getElementById('page-trip');
  // 只在行程页显示
  const isTrip=tripPage&&tripPage.classList.contains('active');
  if(!isTrip||!state.days.length){nav.classList.add('hidden');return;}
  nav.classList.remove('hidden');
  nav.innerHTML=state.days.map((day,di)=>{
    // 取城市名：截取最后一个"·"后的内容
    const parts=day.date.split('·');
    const label=parts[parts.length-1]?.trim()||`Day ${di+1}`;
    return `<div class="day-nav-item" data-di="${di}" data-label="${esc(label)}" onclick="navJump(${di})">
      <div class="day-nav-num">${di+1}</div>
      <div class="day-nav-dot"></div>
    </div>`;
  }).join('');
  updateNavActive();
}

function navJump(di){
  // 先展开那一天
  if(!state.days[di].open){
    state.days[di].open=true;
    render();
    scheduleSave();
  }
  setTimeout(()=>{
    const el=document.getElementById('day-'+di);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

function updateNavActive(){
  const items=document.querySelectorAll('.day-nav-item');
  items.forEach(item=>{
    const di=parseInt(item.dataset.di);
    const el=document.getElementById('day-'+di);
    if(!el)return;
    const rect=el.getBoundingClientRect();
    item.classList.toggle('active', rect.top<=120&&rect.bottom>120);
  });
}

// 滚动时更新高亮
window.addEventListener('scroll',updateNavActive,{passive:true});

function render(){
  const c=document.getElementById('days-container');
  c.innerHTML=state.days.map((day,di)=>renderDay(day,di)).join('');
  updateDaySelector();
  renderNav();
}

function renderDay(day,di){
  const sights=day.items.filter(i=>i.type==='sight').length;
  const foods=day.items.filter(i=>i.type==='food').length;
  const total=day.items.reduce((s,i)=>s+(parseInt(i.duration)||0),0);

  const items=day.items.map((it,ii)=>{
    const isSub=it.type==='sub';
    const isTransitLine=it.type==='transit'||it.type==='plane';
    const isEditing=editingId===it.id;
    if(isEditing) return renderEditForm(di,ii,it);

    // 交通/航班：渲染为连接线
    if(isTransitLine){
      const icon=it.type==='plane'?'✈':'🚗';

        <div class="transit-line" id="item-${it.id}">
          <div class="transit-line-left">
            <div class="transit-line-dot"></div>
            <div class="transit-line-bar"></div>
            <div class="transit-line-dot"></div>
          </div>
          <div class="transit-line-info">
            <div class="transit-line-text">${icon} ${esc(it.name)}${esc(noteText)}</div>
            ${durText?`<div class="transit-line-time">${durText}</div>`:''}
          </div>
          <div class="transit-line-actions">
            <button class="item-btn" onclick="moveItem(${di},${ii},-1)" ${ii===0?'style="opacity:.25;pointer-events:none"':''}>↑</button>
            <button class="item-btn" onclick="moveItem(${di},${ii},1)" ${ii===day.items.length-1?'style="opacity:.25;pointer-events:none"':''}>↓</button>
            <button class="item-btn" onclick="startEdit('${it.id}')">✏️</button>
            <button class="item-btn del" onclick="delItem(${di},${ii})">×</button>
          </div>
        </div>`;
    }

    return `
      <div class="item-row${isSub?' sub':''}" id="item-${it.id}">
        <div class="item-icon ${ICON_CLASS[it.type]||'ic-sight'}">${ICONS[it.type]||'📍'}</div>
        <div class="item-main">
          <div class="item-name">
            ${it.time?`<span class="item-time-tag">${esc(it.time)}</span>`:''}
            ${esc(it.name)}
          </div>
          <div class="item-meta">
            <span>⏱ ${fmtMin(it.duration)}</span>
            ${it.type==='hotel'?'<span class="tag tag-hotel">住宿</span>':''}
            ${isSub?'<span class="tag tag-sub">小景点</span>':''}
          </div>
          ${it.note?`<div class="item-note">${esc(it.note)}</div>`:''}
        </div>
        <div class="item-actions">
          <button class="item-btn" onclick="moveItem(${di},${ii},-1)" title="上移" ${ii===0?'style="opacity:.25;pointer-events:none"':''}>↑</button>
          <button class="item-btn" onclick="moveItem(${di},${ii},1)" title="下移" ${ii===day.items.length-1?'style="opacity:.25;pointer-events:none"':''}>↓</button>
          <button class="item-btn" onclick="startEdit('${it.id}')" title="编辑">✏️</button>
          <button class="item-btn del" onclick="delItem(${di},${ii})" title="删除">×</button>
        </div>
      </div>`;
  }).join('');

  const showForm=day._showForm;
  const formHtml=showForm?`
    <div class="item-edit-form">
      <div class="form-grid">
        <div class="form-field full"><label class="form-label">类型</label>
          <select id="ft-${di}">${TYPE_OPTS.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}</select></div>
        <div class="form-field full"><label class="form-label">名称 *</label>
          <input id="fn-${di}" placeholder="如：圣维特大教堂" /></div>
        <div class="form-field"><label class="form-label">时间</label>
          <input id="fti-${di}" placeholder="09:30" /></div>
        <div class="form-field"><label class="form-label">时长（分钟）</label>
          <input id="fd-${di}" type="number" placeholder="60" min="0" /></div>

          <textarea id="fno-${di}" placeholder="可选"></textarea></div>
      </div>
      <div class="form-btns">
        <button class="btn-save-item" onclick="saveItem(${di})">✓ 保存</button>
        <button class="btn-cancel-item" onclick="cancelForm(${di})">取消</button>
      </div>
    </div>`
  :`<button class="add-row" onclick="showForm(${di})">＋ 添加行程项</button>`;

  return `
    <div class="day-card ${day.open?'open':''}" id="day-${di}">
      <div class="day-head" onclick="toggleDay(${di})">
        <div class="day-badge"><span class="lbl">DAY</span><span class="num">${di+1}</span></div>
        <div class="day-info">
          <div class="day-title">${esc(day.date||'未命名')}</div>
          <div class="day-summary">${esc(day.summary||'点击展开')}</div>
          <div class="day-chips">
            <span class="chip">⛰ ${sights}</span>
            <span class="chip">🍴 ${foods}</span>
            <span class="chip">⏱ ${fmtMin(total)}</span>
          </div>
        </div>
        <div class="chev">⌄</div>
      </div>
      <div class="day-body">
        <div class="meta-edit">
          <input value="${esc(day.date||'')}" placeholder="日期/地点" onchange="updateMeta(${di},'date',this.value)" />
          <input value="${esc(day.summary||'')}" placeholder="当日概览" onchange="updateMeta(${di},'summary',this.value)" />
        </div>
        ${items}
        ${formHtml}
        <button class="add-row" style="margin-top:6px;font-size:12px" onclick="autoSort(${di})">⏱ 按时间自动排序</button>
        <button class="del-day-btn" onclick="delDay(${di})">🗑 删除这一天</button>
      </div>
    </div>`;
}

function renderEditForm(di,ii,it){
  return `
    <div class="item-edit-form" id="edit-${it.id}">
      <div class="form-grid">
        <div class="form-field full"><label class="form-label">类型</label>
          <select id="et-type-${it.id}">${TYPE_OPTS.map(o=>`<option value="${o.v}"${o.v===it.type?' selected':''}>${o.l}</option>`).join('')}</select></div>
        <div class="form-field full"><label class="form-label">名称 *</label>
          <input id="et-name-${it.id}" value="${esc(it.name)}" /></div>
        <div class="form-field"><label class="form-label">时间</label>
          <input id="et-time-${it.id}" value="${esc(it.time||'')}" placeholder="09:30" /></div>
        <div class="form-field"><label class="form-label">时长（分钟）</label>
          <input id="et-dur-${it.id}" type="number" value="${it.duration||0}" min="0" /></div>
        <div class="form-field full"><label class="form-label">备注</label>
          <textarea id="et-note-${it.id}" placeholder="可选">${esc(it.note||'')}</textarea></div>
      </div>
      <div class="form-btns">
        <button class="btn-save-item" onclick="saveEdit(${di},${ii},'${it.id}')">✓ 保存修改</button>
        <button class="btn-cancel-item" onclick="cancelEdit()">取消</button>
      </div>
    </div>`;
}

// ── 行程交互 ──────────────────────────────────────────────
function toggleDay(di){
  state.days[di].open=!state.days[di].open;
  render();scheduleSave();
  if(state.days[di].open)
    setTimeout(()=>document.getElementById('day-'+di)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function updateMeta(di,field,val){state.days[di][field]=val;scheduleSave()}

function startEdit(itemId){
  editingId=itemId;render();
  setTimeout(()=>document.getElementById('et-name-'+itemId)?.focus(),50);
}
function cancelEdit(){editingId=null;render()}

function saveEdit(di,ii,itemId){
  const name=document.getElementById('et-name-'+itemId)?.value.trim();
  if(!name){showToast('名称不能为空');return}
  state.days[di].items[ii]={
    ...state.days[di].items[ii],
    type:document.getElementById('et-type-'+itemId)?.value||'sight',
    name,
    time:document.getElementById('et-time-'+itemId)?.value.trim()||'',
    duration:parseInt(document.getElementById('et-dur-'+itemId)?.value)||0,
    note:document.getElementById('et-note-'+itemId)?.value.trim()||'',
  };
  editingId=null;render();scheduleSave();showToast('已保存 ✓');
}

// 上移 / 下移
function moveItem(di,ii,dir){
  const items=state.days[di].items;
  const target=ii+dir;
  if(target<0||target>=items.length)return;
  [items[ii],items[target]]=[items[target],items[ii]];
  render();scheduleSave();
}

// 自动按时间排序（无时间的排到最后，保持原顺序）
function autoSort(di){
  function toMin(t){
    if(!t||!t.trim())return 9999;
    const m=t.trim().match(/^(\d{1,2}):(\d{2})$/);
    return m?parseInt(m[1])*60+parseInt(m[2]):9999;
  }
  state.days[di].items.sort((a,b)=>toMin(a.time)-toMin(b.time));
  render();scheduleSave();showToast('已按时间排序 ✓');
}

function delItem(di,ii){
  if(!confirm(`删除「${state.days[di].items[ii].name}」？`))return;
  state.days[di].items.splice(ii,1);editingId=null;render();scheduleSave();
}
function showForm(di){state.days[di]._showForm=true;render();setTimeout(()=>document.getElementById('fn-'+di)?.focus(),50)}
function cancelForm(di){state.days[di]._showForm=false;render()}
function saveItem(di){
  const name=document.getElementById('fn-'+di)?.value.trim();
  if(!name){showToast('请输入名称');return}
  state.days[di].items.push({
    id:uid(),
    type:document.getElementById('ft-'+di)?.value||'sight',
    name,
    time:document.getElementById('fti-'+di)?.value.trim()||'',
    duration:parseInt(document.getElementById('fd-'+di)?.value)||0,
    note:document.getElementById('fno-'+di)?.value.trim()||'',
  });
  state.days[di]._showForm=false;render();scheduleSave();showToast('已添加 ✓');
}
function addDay(){
  state.days.push({id:uid(),date:`Day ${state.days.length+1}`,summary:'',open:true,items:[]});
  render();scheduleSave();
  setTimeout(()=>document.getElementById('day-'+(state.days.length-1))?.scrollIntoView({behavior:'smooth'}),80);
}
function delDay(di){
  if(!confirm(`删除「${state.days[di].date}」整天？`))return;
  state.days.splice(di,1);editingId=null;render();scheduleSave();
}

// ── 账单 ──────────────────────────────────────────────────
function renderBill(){
  renderMembers();renderExpenses();renderSettle();
  updatePayerSelect();updateDaySelector();
}

function renderMembers(){
  const list=document.getElementById('member-list');
  if(!billState.members.length){list.innerHTML='<span style="font-size:13px;color:var(--ink3)">还没有成员，先添加吧</span>';return}
  list.innerHTML=billState.members.map((m,i)=>`
    <div class="member-tag">
      <span>${esc(m)}</span>
      <span class="remove-member" onclick="removeMember(${i})">×</span>
    </div>`).join('');
}

function addMember(){
  const input=document.getElementById('new-member-input');
  const name=input.value.trim();
  if(!name){showToast('请输入名字');return}
  if(billState.members.includes(name)){showToast('名字已存在');return}
  if(billState.members.length>=10){showToast('最多 10 人');return}
  billState.members.push(name);input.value='';
  renderBill();scheduleSave();
}
function removeMember(i){
  if(!confirm(`移除「${billState.members[i]}」？相关支出记录不会删除。`))return;
  billState.members.splice(i,1);renderBill();scheduleSave();
}

function updatePayerSelect(){
  const sel=document.getElementById('exp-payer');
  if(!sel)return;
  sel.innerHTML=billState.members.length
    ?billState.members.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('')
    :'<option value="">先添加成员</option>';
}
function updateDaySelector(){
  const sel=document.getElementById('exp-day');
  if(!sel)return;
  sel.innerHTML=`<option value="">不关联具体日期</option>`+
    state.days.map((d,i)=>`<option value="${i}">${esc(d.date)}</option>`).join('');
}

function renderExpenses(){
  const list=document.getElementById('expense-list');
  if(!billState.expenses||!billState.expenses.length){
    list.innerHTML='<div style="font-size:13px;color:var(--ink3);padding:10px 0">还没有支出记录</div>';
    document.getElementById('total-amount').textContent='¥0.00';return;
  }
  const total=billState.expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  document.getElementById('total-amount').textContent='¥'+total.toFixed(2);
  list.innerHTML=billState.expenses.map((e,i)=>`
    <div class="expense-item">
      <div class="expense-info">
        <div class="expense-payer">${esc(e.payer)}</div>
        <div class="expense-desc">${esc(e.desc)}${e.day!==undefined&&e.day!==''?` · ${esc(state.days[e.day]?.date||'')}`:''}</div>
      </div>
      <div class="expense-amount">¥${parseFloat(e.amount).toFixed(2)}</div>
      <button class="expense-del" onclick="delExpense(${i})">×</button>
    </div>`).join('');
}

function addExpense(){
  const payer=document.getElementById('exp-payer')?.value;
  const desc=document.getElementById('exp-desc')?.value.trim();
  const day=document.getElementById('exp-day')?.value;
  const amount=parseFloat(document.getElementById('exp-amount')?.value);
  if(!payer){showToast('请先添加成员');return}
  if(!desc){showToast('请输入项目描述');return}
  if(!amount||amount<=0){showToast('请输入有效金额');return}
  if(!billState.expenses)billState.expenses=[];
  billState.expenses.push({id:uid(),payer,desc,day:day!==''?parseInt(day):'',amount});
  document.getElementById('exp-desc').value='';
  document.getElementById('exp-amount').value='';
  renderBill();scheduleSave();showToast('已记录 ✓');
}
function delExpense(i){
  if(!confirm('删除这条支出？'))return;
  billState.expenses.splice(i,1);renderBill();scheduleSave();
}

function renderSettle(){
  const el=document.getElementById('settle-result');
  const members=billState.members;
  const expenses=billState.expenses||[];
  if(members.length<2){el.innerHTML='<div class="settle-empty">至少需要 2 位成员才能结算</div>';return}
  if(!expenses.length){el.innerHTML='<div class="settle-empty">还没有支出记录</div>';return}

  const total=expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const perPerson=total/members.length;
  const paid={};
  members.forEach(m=>paid[m]=0);
  expenses.forEach(e=>{if(paid[e.payer]!==undefined)paid[e.payer]+=(parseFloat(e.amount)||0)});

  // 计算每人净额（正=多付，负=少付）
  const balance={};
  members.forEach(m=>balance[m]=paid[m]-perPerson);

  // 贪心算法：最少转账次数结算
  const settlements=[];
  const debtors=members.filter(m=>balance[m]<-0.01).map(m=>({name:m,amt:-balance[m]}));
  const creditors=members.filter(m=>balance[m]>0.01).map(m=>({name:m,amt:balance[m]}));
  let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const amt=Math.min(debtors[i].amt,creditors[j].amt);
    settlements.push({from:debtors[i].name,to:creditors[j].name,amt});
    debtors[i].amt-=amt;creditors[j].amt-=amt;
    if(debtors[i].amt<0.01)i++;
    if(creditors[j].amt<0.01)j++;
  }

  if(!settlements.length){el.innerHTML='<div class="settle-empty">✅ 大家已经平账啦！</div>';return}
  el.innerHTML=`
    <div style="font-size:12px;color:var(--ink3);margin-bottom:12px">
      人均 ¥${perPerson.toFixed(2)}，共 ${members.length} 人
    </div>
    <div class="settle-list">
      ${settlements.map(s=>`
        <div class="settle-item">
          <span>${esc(s.from)}</span>
          <span class="settle-arrow">→ 转给</span>
          <span>${esc(s.to)}</span>
          <span class="settle-amount">¥${s.amt.toFixed(2)}</span>
        </div>`).join('')}
    </div>`;
}

// ── 分享 ──────────────────────────────────────────────────
function openShare(){
  document.getElementById('share-url-text').textContent=location.origin+location.pathname+'#trip-'+tripId;
  document.getElementById('share-modal').classList.add('show');
}
function closeShare(){document.getElementById('share-modal').classList.remove('show')}
function closeShareIfBg(e){if(e.target===document.getElementById('share-modal'))closeShare()}
async function copyUrl(){
  const url=document.getElementById('share-url-text').textContent;
  try{await navigator.clipboard.writeText(url)}
  catch{const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}
  showToast('链接已复制，发给朋友吧 🎉');closeShare();
}

// ── Toast & Loading ───────────────────────────────────────
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
function hideLoading(){
  const el=document.getElementById('loading');el.classList.add('hide');
  document.getElementById('app').style.display='block';
  setTimeout(()=>el.remove(),500);
}

init();
</script>
